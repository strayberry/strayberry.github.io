name: Deploy site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BUNDLE_FORCE_RUBY_PLATFORM: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler: 2.6.9
          bundler-cache: false
      - name: Refresh yanked gem locks
        run: |
          bundle lock --add-platform ruby
          bundle lock --remove-platform x86_64-linux || true
          bundle lock --update ffi sass-embedded google-protobuf
      - name: Bundle Install
        run: |
          bundle install --jobs 4 --retry 3
      - name: Jekyll Build
        env:
          JEKYLL_ENV: production
        run: |
          bundle exec jekyll build --trace
          touch _site/.nojekyll
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
